<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Scanner F6 Estoque</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  :root {
    --bg:#0f1117; --surface:#1a1d27; --surface2:#242736; --border:#2e3244;
    --accent:#5b8def; --green:#4ade80; --orange:#fb923c; --purple:#a78bfa;
    --text:#e8eaed; --text-dim:#8b8fa3; --text-muted:#5a5e72;
  }
  body { font-family:"DM Sans",sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
  .app { max-width:640px; margin:0 auto; padding:16px; padding-bottom:90px; }

  /* HEADER */
  .header { text-align:center; padding:20px 0 16px; }
  .header h1 { font-size:22px; font-weight:700; background:linear-gradient(135deg,#5b8def,#a78bfa); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .header p { font-size:12px; color:var(--text-dim); margin-top:3px; }

  /* STATS */
  .stats { display:flex; gap:8px; margin-bottom:14px; }
  .stat { flex:1; background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:10px; text-align:center; }
  .stat-val { font-size:20px; font-weight:700; }
  .stat-val.blue { color:var(--accent); }
  .stat-val.green { color:var(--green); }
  .stat-val.orange { color:var(--orange); }
  .stat-label { font-size:10px; color:var(--text-dim); margin-top:1px; }

  /* SEARCH + FILTER */
  .search-bar { position:relative; margin-bottom:10px; }
  .search-bar input {
    width:100%; padding:12px 12px 12px 40px;
    background:var(--surface); border:1px solid var(--border);
    border-radius:12px; color:var(--text); font-size:15px; font-family:inherit; outline:none;
  }
  .search-bar input:focus { border-color:var(--accent); }
  .search-icon { position:absolute; left:13px; top:50%; transform:translateY(-50%); color:var(--text-dim); pointer-events:none; font-size:16px; }
  .filters { display:flex; gap:6px; margin-bottom:14px; }
  .filter-btn {
    flex:1; padding:8px 4px; font-size:12px; font-weight:600; font-family:inherit;
    border:1px solid var(--border); border-radius:10px;
    background:var(--surface); color:var(--text-dim); cursor:pointer; transition:all .15s;
  }
  .filter-btn.active { background:var(--accent); border-color:var(--accent); color:#fff; }

  /* PRODUCT CARD */
  .product-card {
    background:var(--surface); border:1px solid var(--border);
    border-radius:14px; padding:13px 14px; margin-bottom:8px;
    display:flex; align-items:center; gap:12px; cursor:pointer;
    transition:background .15s, border-color .15s;
  }
  .product-card:active { background:var(--surface2); }
  .product-card.done { border-left:3px solid var(--green); }
  .product-info { flex:1; min-width:0; }
  .product-name { font-size:14px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .product-meta { font-size:11px; color:var(--text-dim); margin-top:3px; display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
  .product-barcode { font-size:11px; color:var(--green); margin-top:3px; font-family:monospace; }
  .tag { display:inline-block; padding:1px 7px; border-radius:6px; font-size:10px; font-weight:600; background:rgba(91,141,239,.15); color:var(--accent); }
  .btn-scan {
    flex-shrink:0; width:38px; height:38px; border-radius:10px;
    border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:20px;
    background:rgba(91,141,239,.15); transition:background .15s;
  }
  .product-card.done .btn-scan { background:rgba(74,222,128,.15); }
  .empty-state { text-align:center; padding:50px 20px; color:var(--text-muted); font-size:14px; }
  .more-hint { text-align:center; color:var(--text-muted); font-size:12px; padding:10px; }

  /* DOWNLOAD BAR */
  .dl-bar {
    position:fixed; bottom:0; left:0; right:0;
    padding:10px 16px 22px; background:var(--surface); border-top:1px solid var(--border);
    display:flex; justify-content:center; gap:10px; z-index:50;
  }
  .btn-dl {
    padding:12px 28px; background:linear-gradient(135deg,var(--accent),var(--purple));
    border:none; border-radius:12px; color:#fff; font-size:14px; font-weight:600;
    font-family:inherit; cursor:pointer;
  }
  .btn-dl-sec {
    padding:12px 20px; background:var(--surface2); border:1px solid var(--border);
    border-radius:12px; color:var(--text); font-size:14px; font-weight:600;
    font-family:inherit; cursor:pointer;
  }

  /* SCANNER OVERLAY */
  .scan-overlay { position:fixed; inset:0; background:#000; z-index:200; display:flex; flex-direction:column; }
  .scan-hdr {
    position:absolute; top:0; left:0; right:0; z-index:10; padding:14px 16px;
    display:flex; align-items:center; justify-content:space-between;
    background:linear-gradient(to bottom,rgba(0,0,0,.8) 0%,transparent 100%);
  }
  .scan-prod-name { font-size:14px; font-weight:600; max-width:75%; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .scan-prod-sub { font-size:11px; color:rgba(255,255,255,.5); margin-top:2px; }
  .btn-close {
    width:36px; height:36px; border-radius:50%; border:1px solid rgba(255,255,255,.3);
    background:rgba(0,0,0,.4); color:#fff; font-size:20px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
  }
  .scan-view { flex:1; position:relative; overflow:hidden; }
  #scanVideo { width:100%; height:100%; object-fit:cover; }
  .scan-frame {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    width:270px; height:130px; border:2px solid #4ade80; border-radius:12px;
    box-shadow:0 0 0 2000px rgba(0,0,0,.52); pointer-events:none;
  }
  .scan-line {
    position:absolute; width:250px; left:50%; margin-left:-125px; height:2px;
    background:linear-gradient(90deg,transparent,#4ade80,transparent);
    animation:scanline 1.8s ease-in-out infinite;
  }
  @keyframes scanline { 0%,100%{top:calc(50% - 50px)} 50%{top:calc(50% + 50px)} }
  #scanStatus {
    position:absolute; bottom:145px; left:50%; transform:translateX(-50%);
    background:rgba(0,0,0,.65); color:#fff; font-size:13px; font-weight:500;
    padding:8px 20px; border-radius:20px; white-space:nowrap; pointer-events:none;
  }
  .scan-ftr {
    position:absolute; bottom:0; left:0; right:0; padding:18px 20px 36px;
    background:linear-gradient(to top,rgba(0,0,0,.85) 0%,transparent 100%);
    display:flex; flex-direction:column; align-items:center; gap:10px;
  }
  .manual-row { display:flex; gap:8px; width:100%; max-width:460px; }
  .manual-row input {
    flex:1; padding:13px 14px; background:rgba(255,255,255,.1);
    border:1px solid rgba(255,255,255,.2); border-radius:12px;
    color:#fff; font-size:15px; font-family:inherit; outline:none;
  }
  .manual-row input::placeholder { color:rgba(255,255,255,.4); }
  .btn-manual {
    padding:13px 20px; background:var(--green); border:none; border-radius:12px;
    color:#000; font-size:14px; font-weight:700; font-family:inherit; cursor:pointer;
  }
  #cameraInput { display:none; }

  /* FALLBACK */
  .fallback-body { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:30px 20px; }
  .fallback-icon { font-size:56px; margin-bottom:14px; }
  .fallback-title { font-size:17px; font-weight:600; margin-bottom:6px; }
  .fallback-sub { font-size:13px; color:var(--text-dim); text-align:center; margin-bottom:24px; }
  .btn-take-photo {
    padding:16px 36px; background:var(--accent); border:none; border-radius:14px;
    color:#fff; font-size:16px; font-weight:600; font-family:inherit; cursor:pointer;
  }
  #fallbackFeedback { margin-top:14px; font-size:13px; color:#ef4444; text-align:center; }

  /* SUCCESS FLASH */
  .success-flash {
    position:fixed; inset:0; z-index:300;
    display:flex; align-items:center; justify-content:center;
    background:rgba(0,0,0,.7); animation:fadeInOut 1.3s ease forwards;
    pointer-events:none;
  }
  @keyframes fadeInOut { 0%{opacity:0} 15%{opacity:1} 75%{opacity:1} 100%{opacity:0} }
  .success-inner { background:var(--surface); border:1px solid var(--green); border-radius:20px; padding:28px 40px; text-align:center; }
  .success-icon { font-size:46px; }
  .success-code { font-size:18px; font-weight:700; font-family:monospace; color:var(--green); margin:8px 0 4px; }
  .success-label { font-size:13px; color:var(--text-dim); }

  /* TOAST */
  .toast {
    position:fixed; bottom:100px; left:50%; transform:translateX(-50%);
    background:var(--surface2); border:1px solid var(--border); border-radius:12px;
    padding:12px 24px; font-size:13px; font-weight:600; color:var(--text);
    z-index:400; white-space:nowrap; animation:toastIn .3s ease;
  }
  @keyframes toastIn { from{opacity:0;transform:translate(-50%,10px)} to{opacity:1;transform:translate(-50%,0)} }
</style>
</head>

// Clone para trabalhar
let products = PRODUCTS_RAW.map(p => ({...p}));

let searchTerm = "";
let filterMode = "all";
let scanningProduct = null;
let quaggaRunning = false;
let liveStream = null;
let codeBuffer = [];
let barcodeInterval = null;

// ---- UTILS ----
function getFiltered() {
  let list = products;
  if (searchTerm.trim()) {
    const terms = searchTerm.toLowerCase().split(/\s+/);
    list = list.filter(p => terms.every(t =>
      (p.nome + " " + p.codigo + " " + p.subgrupo + " " + p.cod).toLowerCase().includes(t)
    ));
  }
  if (filterMode === "pending") list = list.filter(p => !p.barras);
  if (filterMode === "done")    list = list.filter(p => !!p.barras);
  return list;
}

function getStats() {
  const done = products.filter(p => !!p.barras).length;
  return { total: products.length, done, pending: products.length - done };
}

// ---- RENDER ----
function render() {
  const s = getStats();
  const filtered = getFiltered();
  const show = filtered.slice(0, 200);

  document.getElementById("app").innerHTML = `
    <div class="header">
      <h1>📦 F6 Estoque — Scanner</h1>
      <p>${s.total} produtos · Escaneie para preencher a coluna BARRAS</p>
    </div>
    <div class="stats">
      <div class="stat"><div class="stat-val blue">${s.total}</div><div class="stat-label">Total</div></div>
      <div class="stat"><div class="stat-val green">${s.done}</div><div class="stat-label">Com barras</div></div>
      <div class="stat"><div class="stat-val orange">${s.pending}</div><div class="stat-label">Sem barras</div></div>
    </div>
    <div class="search-bar">
      <span class="search-icon">🔍</span>
      <input id="searchInput" type="text" placeholder="Buscar produto, subgrupo, código..." value="${searchTerm}" autocomplete="off" />
    </div>
    <div class="filters">
      <button class="filter-btn ${filterMode==="all"?"active":""}" onclick="setFilter('all')">Todos (${s.total})</button>
      <button class="filter-btn ${filterMode==="pending"?"active":""}" onclick="setFilter('pending')">Sem barras (${s.pending})</button>
      <button class="filter-btn ${filterMode==="done"?"active":""}" onclick="setFilter('done')">Com barras (${s.done})</button>
    </div>
    <div id="productList">
      ${show.length === 0
        ? '<div class="empty-state">Nenhum produto encontrado</div>'
        : show.map(p => `
          <div class="product-card ${p.barras?"done":""}" onclick="openScanner(${p.id})">
            <div class="product-info">
              <div class="product-name">${p.nome}</div>
              <div class="product-meta">
                <span>Cód: <b>${p.codigo}</b></span>
                <span>${p.un}</span>
                <span class="tag">${p.subgrupo}</span>
              </div>
              ${p.barras ? `<div class="product-barcode">☑ ${p.barras}</div>` : ""}
            </div>
            <div class="btn-scan">${p.barras ? "✅" : "📷"}</div>
          </div>`).join("")
      }
      ${filtered.length > 200 ? `<div class="more-hint">Mostrando 200 de ${filtered.length}. Use a busca para filtrar.</div>` : ""}
    </div>
    <div class="dl-bar">
      <button class="btn-dl-sec" onclick="downloadTXT()">⬇ TXT Linear</button>
      <button class="btn-dl" onclick="downloadCSV()">⬇ CSV Atualizado</button>
    </div>`;

  const si = document.getElementById("searchInput");
  if (si) {
    si.addEventListener("input", e => { searchTerm = e.target.value; render(); });
    if (searchTerm) { si.focus(); si.setSelectionRange(si.value.length, si.value.length); }
  }
}

function setFilter(m) { filterMode = m; render(); }

// ---- SCANNER ----
function openScanner(id) {
  scanningProduct = products.find(p => p.id === id);
  if (!scanningProduct) return;
  codeBuffer = [];
  if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
    navigator.mediaDevices.getUserMedia({
      video: { facingMode:"environment", width:{ideal:1280}, height:{ideal:720} }
    }).then(stream => { liveStream = stream; showLiveScanner(); })
      .catch(() => showFallbackScanner());
  } else { showFallbackScanner(); }
}

function showLiveScanner() {
  const o = document.createElement("div");
  o.className = "scan-overlay"; o.id = "scannerOverlay";
  o.innerHTML = `
    <div class="scan-hdr">
      <div>
        <div class="scan-prod-name">${scanningProduct.nome}</div>
        <div class="scan-prod-sub">${scanningProduct.subgrupo} · Cód: ${scanningProduct.codigo}</div>
      </div>
      <button class="btn-close" id="btnClose">✕</button>
    </div>
    <div class="scan-view">
      <video id="scanVideo" autoplay playsinline muted></video>
      <div class="scan-frame"></div>
      <div class="scan-line"></div>
      <div id="scanStatus">Aponte para o código de barras</div>
    </div>
    <div class="scan-ftr">
      <div class="manual-row">
        <input type="text" id="manualInput" placeholder="Ou digite o código de barras..." inputmode="numeric" />
        <button class="btn-manual" id="btnManual">Salvar</button>
      </div>
    </div>`;
  document.body.appendChild(o);
  document.getElementById("scanVideo").srcObject = liveStream;
  document.getElementById("btnClose").onclick = closeScanner;
  document.getElementById("btnManual").onclick = () => {
    const v = document.getElementById("manualInput").value.trim();
    if (v) saveBarcodeAndClose(v);
  };
  document.getElementById("manualInput").addEventListener("keydown", e => {
    if (e.key === "Enter") { const v = e.target.value.trim(); if(v) saveBarcodeAndClose(v); }
  });
  if ("BarcodeDetector" in window) {
    startBarcodeDetector(document.getElementById("scanVideo"));
  } else {
    loadQuagga(() => startQuagga());
  }
}

function startBarcodeDetector(video) {
  const det = new BarcodeDetector({formats:["ean_13","ean_8","code_128","code_39","upc_a","upc_e","itf"]});
  updateStatus("🔍 Câmera ativa...");
  barcodeInterval = setInterval(async () => {
    if (!video.videoWidth) return;
    try {
      const r = await det.detect(video);
      if (r.length > 0) {
        const code = r[0].rawValue;
        codeBuffer.push(code);
        if (codeBuffer.filter(c=>c===code).length >= 3) {
          clearInterval(barcodeInterval); barcodeInterval = null;
          if (navigator.vibrate) navigator.vibrate([100,50,100]);
          saveBarcodeAndClose(code);
        } else { updateStatus("Detectando: " + code + "..."); }
      }
    } catch(e) {}
  }, 200);
}

function loadQuagga(cb) {
  if (typeof Quagga !== "undefined") { cb(); return; }
  const s = document.createElement("script");
  s.src = "https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js";
  s.onload = cb; document.head.appendChild(s);
}

function startQuagga() {
  updateStatus("🔍 Câmera ativa...");
  Quagga.init({
    inputStream:{ type:"LiveStream", target:document.getElementById("scanVideo").parentElement,
      constraints:{ facingMode:"environment", width:{ideal:1280}, height:{ideal:720} } },
    decoder:{ readers:["ean_reader","ean_8_reader","code_128_reader","code_39_reader","upc_reader","upc_e_reader"] },
    locate: true
  }, err => {
    if (err) { updateStatus("⚠ Erro câmera"); return; }
    Quagga.start(); quaggaRunning = true;
  });
  Quagga.onDetected(result => {
    if (!result?.codeResult?.code) return;
    const code = result.codeResult.code;
    codeBuffer.push(code);
    if (codeBuffer.filter(c=>c===code).length >= 3) {
      if (navigator.vibrate) navigator.vibrate([100,50,100]);
      saveBarcodeAndClose(code);
    } else { updateStatus("Lendo: " + code + "..."); }
  });
}

function showFallbackScanner() {
  const o = document.createElement("div");
  o.className = "scan-overlay"; o.id = "scannerOverlay";
  o.innerHTML = `
    <div class="scan-hdr">
      <div>
        <div class="scan-prod-name">${scanningProduct.nome}</div>
        <div class="scan-prod-sub">${scanningProduct.subgrupo}</div>
      </div>
      <button class="btn-close" id="btnClose">✕</button>
    </div>
    <div class="fallback-body">
      <div class="fallback-icon">📸</div>
      <div class="fallback-title">Câmera ao vivo indisponível</div>
      <div class="fallback-sub">Tire uma foto do código de barras para detectar automaticamente</div>
      <button class="btn-take-photo" id="btnPhoto">📷 Tirar Foto</button>
      <div id="fallbackFeedback"></div>
    </div>
    <div class="scan-ftr">
      <div class="manual-row">
        <input type="text" id="manualInput" placeholder="Ou digite o código de barras..." inputmode="numeric" />
        <button class="btn-manual" id="btnManual">Salvar</button>
      </div>
    </div>`;
  document.body.appendChild(o);
  document.getElementById("btnClose").onclick = closeScanner;
  document.getElementById("btnPhoto").onclick = () => document.getElementById("cameraInput").click();
  document.getElementById("btnManual").onclick = () => {
    const v = document.getElementById("manualInput").value.trim();
    if (v) saveBarcodeAndClose(v);
  };
}

document.getElementById("cameraInput").addEventListener("change", function(ev) {
  const file = ev.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement("canvas");
      const w = Math.min(img.width, 1280);
      canvas.width = w; canvas.height = img.height * (w/img.width);
      canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
      if ("BarcodeDetector" in window) {
        new BarcodeDetector({formats:["ean_13","ean_8","code_128","code_39","upc_a","upc_e"]})
          .detect(canvas)
          .then(r => { if(r.length>0) saveBarcodeAndClose(r[0].rawValue); else runQuaggaOnCanvas(canvas,w); })
          .catch(() => runQuaggaOnCanvas(canvas, w));
      } else { runQuaggaOnCanvas(canvas, w); }
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
  ev.target.value = "";
});

function runQuaggaOnCanvas(canvas, w) {
  loadQuagga(() => {
    Quagga.decodeSingle({
      src: canvas.toDataURL("image/jpeg", 0.9), numOfWorkers:0,
      inputStream:{size: w > 640 ? 640 : w},
      decoder:{readers:["ean_reader","ean_8_reader","code_128_reader","code_39_reader","upc_reader","upc_e_reader"]},
      locate:true, locator:{halfSample:false, patchSize:"large"}
    }, result => {
      if (result?.codeResult?.code) saveBarcodeAndClose(result.codeResult.code);
      else {
        const fb = document.getElementById("fallbackFeedback");
        if (fb) fb.textContent = "⚠️ Não detectado. Tente mais perto.";
      }
    });
  });
}

function updateStatus(msg) {
  const el = document.getElementById("scanStatus"); if(el) el.textContent = msg;
}

function saveBarcodeAndClose(code) {
  if (barcodeInterval) { clearInterval(barcodeInterval); barcodeInterval = null; }
  stopQuagga();
  if (liveStream) { liveStream.getTracks().forEach(t=>t.stop()); liveStream = null; }
  if (scanningProduct) scanningProduct.barras = code;
  const overlay = document.getElementById("scannerOverlay"); if(overlay) overlay.remove();
  const flash = document.createElement("div");
  flash.className = "success-flash";
  flash.innerHTML = `<div class="success-inner">
    <div class="success-icon">✅</div>
    <div class="success-code">${code}</div>
    <div class="success-label">Código salvo com sucesso!</div>
  </div>`;
  document.body.appendChild(flash);
  setTimeout(() => flash.remove(), 1300);
  scanningProduct = null; codeBuffer = [];
  render();
}

function stopQuagga() {
  try { if(quaggaRunning){ Quagga.stop(); Quagga.offDetected(); quaggaRunning=false; } } catch(e){}
}

function closeScanner() {
  if (barcodeInterval) { clearInterval(barcodeInterval); barcodeInterval = null; }
  stopQuagga();
  if (liveStream) { liveStream.getTracks().forEach(t=>t.stop()); liveStream = null; }
  const o = document.getElementById("scannerOverlay"); if(o) o.remove();
  scanningProduct = null; codeBuffer = [];
}

// ---- EXPORT ----
function downloadCSV() {
  const header = "COD;SUBGRUPOS;CÓDIGO;PRODUTOS;UN;BARRAS";
  const rows = products.map(p => {
    const esc = s => String(s||"").includes(";") ? `"${s}"` : String(s||"");
    return [esc(p.cod), esc(p.subgrupo), esc(p.codigo), esc(p.nome), esc(p.un), esc(p.barras)].join(";");
  });
  const blob = new Blob(["\uFEFF" + header + "\n" + rows.join("\n")], {type:"text/csv;charset=utf-8;"});
  const a = document.createElement("a"); a.href = URL.createObjectURL(blob);
  a.download = "F6Estoque_atualizado.csv"; a.click();
}

function downloadTXT() {
  const lines = products.filter(p => p.barras).map(p => {
    const cod = String(p.barras).padStart(13,"0").slice(0,13);
    return cod + "00001000";
  });
  if (!lines.length) { showToast("⚠ Nenhum produto com código ainda"); return; }
  const blob = new Blob([lines.join("\n")], {type:"text/plain;charset=utf-8;"});
  const a = document.createElement("a"); a.href = URL.createObjectURL(blob);
  a.download = "coletor_linear.txt"; a.click();
}

function showToast(msg) {
  const t = document.createElement("div"); t.className = "toast"; t.textContent = msg;
  document.body.appendChild(t); setTimeout(() => t.remove(), 3000);
}

render();
</script>
