<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Scanner de Código de Barras</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');
  
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #242736;
    --border: #2e3244;
    --accent: #5b8def;
    --accent-glow: rgba(91, 141, 239, 0.15);
    --green: #4ade80;
    --green-glow: rgba(74, 222, 128, 0.15);
    --orange: #fb923c;
    --text: #e8eaed;
    --text-dim: #8b8fa3;
    --text-muted: #5a5e72;
    --danger: #ef4444;
  }
  
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }
  
  .app {
    max-width: 600px;
    margin: 0 auto;
    padding: 16px;
    padding-bottom: 100px;
  }
  
  .header {
    text-align: center;
    padding: 24px 0 20px;
  }
  
  .header h1 {
    font-size: 22px;
    font-weight: 700;
    background: linear-gradient(135deg, #5b8def, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -0.5px;
  }
  
  .header .subtitle {
    font-size: 13px;
    color: var(--text-dim);
    margin-top: 4px;
  }
  
  .stats-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }
  
  .stat {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px;
    text-align: center;
  }
  
  .stat-value {
    font-size: 20px;
    font-weight: 700;
    color: var(--accent);
  }
  
  .stat-value.green { color: var(--green); }
  .stat-value.orange { color: var(--orange); }
  
  .stat-label {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 2px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  
  .search-box {
    position: relative;
    margin-bottom: 12px;
  }
  
  .search-box input {
    width: 100%;
    padding: 14px 16px 14px 44px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    color: var(--text);
    font-size: 15px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  
  .search-box input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }
  
  .search-box input::placeholder { color: var(--text-muted); }
  
  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
  }
  
  .filter-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }
  
  .filter-tab {
    padding: 8px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--text-dim);
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
  }
  
  .filter-tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  
  .product-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  
  .product-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  
  .product-card:hover {
    border-color: var(--accent);
    background: var(--surface2);
  }
  
  .product-card:active {
    transform: scale(0.98);
  }
  
  .product-card.has-barcode {
    border-left: 3px solid var(--green);
  }
  
  .product-info { flex: 1; min-width: 0; }
  
  .product-name {
    font-size: 14px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  
  .product-meta {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 3px;
    display: flex;
    gap: 12px;
  }
  
  .product-barcode {
    font-size: 11px;
    color: var(--green);
    margin-top: 3px;
    font-weight: 500;
  }
  
  .product-action {
    flex-shrink: 0;
    width: 36px;
    height: 36px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--accent-glow);
    color: var(--accent);
  }
  
  .product-card.has-barcode .product-action {
    background: var(--green-glow);
    color: var(--green);
  }
  
  .result-count {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 8px;
    padding-left: 4px;
  }
  
  /* Scanner Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 20px;
    animation: fadeIn 0.2s ease;
  }
  
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  
  .modal-header {
    width: 100%;
    max-width: 500px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  
  .modal-title {
    font-size: 16px;
    font-weight: 600;
  }
  
  .modal-product-name {
    font-size: 13px;
    color: var(--accent);
    margin-top: 2px;
  }
  
  .btn-close {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  
  .scanner-container {
    width: 100%;
    max-width: 500px;
    aspect-ratio: 4/3;
    background: #000;
    border-radius: 16px;
    overflow: hidden;
    position: relative;
  }
  
  .scanner-container video {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  
  .scanner-container canvas {
    display: none;
  }
  
  .scan-line {
    position: absolute;
    left: 10%;
    right: 10%;
    height: 2px;
    background: var(--accent);
    box-shadow: 0 0 12px var(--accent);
    animation: scanMove 2s ease-in-out infinite;
    z-index: 2;
  }
  
  @keyframes scanMove {
    0%, 100% { top: 20%; }
    50% { top: 80%; }
  }
  
  .scan-corners {
    position: absolute;
    inset: 15%;
    border: 2px solid transparent;
    z-index: 2;
  }
  
  .scan-corners::before,
  .scan-corners::after {
    content: '';
    position: absolute;
    width: 24px;
    height: 24px;
    border-color: var(--accent);
    border-style: solid;
  }
  
  .scan-corners::before {
    top: 0; left: 0;
    border-width: 3px 0 0 3px;
    border-radius: 4px 0 0 0;
  }
  
  .scan-corners::after {
    top: 0; right: 0;
    border-width: 3px 3px 0 0;
    border-radius: 0 4px 0 0;
  }
  
  .scan-corners-bottom {
    position: absolute;
    inset: 15%;
    z-index: 2;
    pointer-events: none;
  }
  
  .scan-corners-bottom::before,
  .scan-corners-bottom::after {
    content: '';
    position: absolute;
    width: 24px;
    height: 24px;
    border-color: var(--accent);
    border-style: solid;
  }
  
  .scan-corners-bottom::before {
    bottom: 0; left: 0;
    border-width: 0 0 3px 3px;
    border-radius: 0 0 0 4px;
  }
  
  .scan-corners-bottom::after {
    bottom: 0; right: 0;
    border-width: 0 3px 3px 0;
    border-radius: 0 0 4px 0;
  }
  
  .manual-input {
    width: 100%;
    max-width: 500px;
    margin-top: 16px;
    display: flex;
    gap: 8px;
  }
  
  .manual-input input {
    flex: 1;
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-size: 15px;
    font-family: inherit;
    outline: none;
  }
  
  .manual-input input:focus {
    border-color: var(--accent);
  }
  
  .btn-save {
    padding: 12px 24px;
    background: var(--accent);
    border: none;
    border-radius: 12px;
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  
  .btn-save:hover { opacity: 0.85; }
  
  .scan-result {
    width: 100%;
    max-width: 500px;
    margin-top: 12px;
    padding: 12px 16px;
    background: var(--green-glow);
    border: 1px solid var(--green);
    border-radius: 12px;
    text-align: center;
    color: var(--green);
    font-weight: 600;
    font-size: 18px;
    animation: pulse 0.3s ease;
  }
  
  @keyframes pulse {
    0% { transform: scale(0.95); }
    50% { transform: scale(1.02); }
    100% { transform: scale(1); }
  }
  
  /* Download button */
  .download-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 12px 16px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: center;
    z-index: 50;
  }
  
  .btn-download {
    padding: 12px 32px;
    background: linear-gradient(135deg, #5b8def, #a78bfa);
    border: none;
    border-radius: 12px;
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: opacity 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  
  .btn-download:hover { opacity: 0.9; }
  
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-muted);
  }
  
  .empty-state svg { margin-bottom: 12px; opacity: 0.4; }
  
  .scanner-msg {
    text-align: center;
    color: var(--text-dim);
    font-size: 13px;
    margin-top: 12px;
    max-width: 500px;
  }
</style>
</head>

let products = PRODUCTS_DATA.map((p, i) => ({
  id: i,
  codigo: p.pro_codigo,
  nome: p.pro_desc,
  barcode: p["Codigo de barras"] || "",
  embalagem: p.unp_descemb || ""
}));

let searchTerm = "";
let filter = "all"; // all, pending, done
let scanningProduct = null;
let scannedCode = "";

function getFiltered() {
  let list = products;
  if (searchTerm.trim()) {
    const terms = searchTerm.toLowerCase().split(/\s+/);
    list = list.filter(p => {
      const text = (p.nome + " " + p.codigo).toLowerCase();
      return terms.every(t => text.includes(t));
    });
  }
  if (filter === "pending") list = list.filter(p => !p.barcode);
  if (filter === "done") list = list.filter(p => !!p.barcode);
  return list;
}

function getStats() {
  const total = products.length;
  const done = products.filter(p => !!p.barcode).length;
  return { total, done, pending: total - done };
}

    <div class="filter-tabs">
      <button class="filter-tab ${filter==='all'?'active':''}" data-filter="all">Todos</button>
      <button class="filter-tab ${filter==='pending'?'active':''}" data-filter="pending">Pendentes</button>
      <button class="filter-tab ${filter==='done'?'active':''}" data-filter="done">Concluídos</button>
    </div>
    
    <div class="result-count">${filtered.length} produto${filtered.length!==1?'s':''} encontrado${filtered.length!==1?'s':''}</div>
    
    <div class="product-list">
      ${filtered.length === 0 ? `
        <div class="empty-state">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          <div>Nenhum produto encontrado</div>
        </div>
      ` : filtered.slice(0, 100).map(p => `
        <div class="product-card ${p.barcode ? 'has-barcode' : ''}" data-id="${p.id}">
          <div class="product-info">
            <div class="product-name">${p.nome}</div>
            <div class="product-meta">
              <span>Cód: ${p.codigo}</span>
              <span>${p.embalagem}</span>
            </div>
            ${p.barcode ? `<div class="product-barcode">☑ ${p.barcode}</div>` : ''}
          </div>
          <div class="product-action">
            ${p.barcode ? `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6 9 17l-5-5"/></svg>` 
            : `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M7 8v8M11 8v8M15 8v8M19 8v8"/></svg>`}
          </div>
        </div>
      `).join('')}
      ${filtered.length > 100 ? `<div class="result-count" style="text-align:center;padding:16px;">Mostrando 100 de ${filtered.length}. Refine sua busca.</div>` : ''}
    </div>
    
    <div class="download-bar">
      <button class="btn-download" id="btnDownload">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Baixar Planilha Atualizada
      </button>
    </div>
  `;
  
  // Events
  document.getElementById("searchInput").addEventListener("input", e => {
    searchTerm = e.target.value;
    render();
    document.getElementById("searchInput").focus();
  });
  
  document.querySelectorAll(".filter-tab").forEach(btn => {
    btn.addEventListener("click", () => {
      filter = btn.dataset.filter;
      render();
    });
  });
  
  document.querySelectorAll(".product-card").forEach(card => {
    card.addEventListener("click", () => {
      const id = parseInt(card.dataset.id);
      openScanner(products[id]);
    });
  });
  
  document.getElementById("btnDownload").addEventListener("click", downloadXlsx);
}

function openScanner(product) {
  scanningProduct = product;
  scannedCode = product.barcode || "";
  renderScanner();
}

function renderScanner() {
  const p = scanningProduct;
  if (!p) return;
  
  let overlay = document.getElementById("scannerOverlay");
  if (!overlay) {
    overlay = document.createElement("div");
    overlay.id = "scannerOverlay";
    overlay.className = "modal-overlay";
    document.body.appendChild(overlay);
  }
  
  overlay.innerHTML = `
    <div class="modal-header">
      <div>
        <div class="modal-title">Escanear Código de Barras</div>
        <div class="modal-product-name">${p.nome}</div>
      </div>
      <button class="btn-close" id="btnCloseScanner">✕</button>
    </div>
    
    <div class="scanner-container" id="scannerView">
      <div class="scan-line"></div>
      <div class="scan-corners"></div>
      <div class="scan-corners-bottom"></div>
    </div>
    
    <div class="scanner-msg">Aponte a câmera para o código de barras do produto</div>
    
    ${scannedCode ? `<div class="scan-result">✓ ${scannedCode}</div>` : ''}
    
    <div class="manual-input">
      <input type="text" id="manualBarcode" placeholder="Ou digite o código manualmente..." value="${scannedCode}" inputmode="numeric" />
      <button class="btn-save" id="btnSaveBarcode">Salvar</button>
    </div>
  `;
  
  document.getElementById("btnCloseScanner").addEventListener("click", closeScanner);
  document.getElementById("btnSaveBarcode").addEventListener("click", () => {
    const code = document.getElementById("manualBarcode").value.trim();
    if (code) {
      scanningProduct.barcode = code;
      closeScanner();
      render();
    }
  });
  
  document.getElementById("manualBarcode").addEventListener("keydown", e => {
    if (e.key === "Enter") {
      document.getElementById("btnSaveBarcode").click();
    }
  });
  
  // Start Quagga
  startScanner();
}

function startScanner() {
  if (typeof Quagga === "undefined") return;
  
  Quagga.init({
    inputStream: {
      name: "Live",
      type: "LiveStream",
      target: document.getElementById("scannerView"),
      constraints: {
        facingMode: "environment",
        width: { ideal: 1280 },
        height: { ideal: 720 }
      }
    },
    decoder: {
      readers: [
        "ean_reader",
        "ean_8_reader",
        "code_128_reader",
        "code_39_reader",
        "upc_reader",
        "upc_e_reader",
        "i2of5_reader"
      ]
    },
    locate: true,
    frequency: 10
  }, function(err) {
    if (err) {
      console.log("Camera error:", err);
      return;
    }
    Quagga.start();
  });
  
  Quagga.onDetected(function(result) {
    const code = result.codeResult.code;
    if (code && code.length >= 4) {
      scannedCode = code;
      // Vibrate if available
      if (navigator.vibrate) navigator.vibrate(100);
      
      Quagga.stop();
      
      document.getElementById("manualBarcode").value = code;
      
      const scanView = document.getElementById("scannerView");
      if (scanView) {
        scanView.innerHTML = `
          <div style="display:flex;align-items:center;justify-content:center;height:100%;background:#0d1a0d;">
            <div style="text-align:center;">
              <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#4ade80" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>
              <div style="color:#4ade80;font-size:24px;font-weight:700;margin-top:12px;">${code}</div>
              <div style="color:#8b8fa3;font-size:13px;margin-top:4px;">Código detectado!</div>
            </div>
          </div>
        `;
      }
      
      // Insert result display
      const existing = document.querySelector(".scan-result");
      if (!existing) {
        const msg = document.querySelector(".scanner-msg");
        if (msg) {
          msg.insertAdjacentHTML("afterend", `<div class="scan-result">✓ ${code}</div>`);
        }
      } else {
        existing.textContent = "✓ " + code;
      }
    }
  });
}

function closeScanner() {
  try { Quagga.stop(); } catch(e) {}
  const overlay = document.getElementById("scannerOverlay");
  if (overlay) overlay.remove();
  scanningProduct = null;
  scannedCode = "";
}

async function downloadXlsx() {
  // Build CSV and use SheetJS if available, otherwise CSV
  const header = "pro_codigo,pro_desc,Codigo de barras,unp_descemb";
  const rows = products.map(p => {
    const esc = s => `"${String(s).replace(/"/g, '""')}"`;
    return [esc(p.codigo), esc(p.nome), esc(p.barcode), esc(p.embalagem)].join(",");
  });
  
  const csv = header + "\n" + rows.join("\n");
  const BOM = "\uFEFF";
  const blob = new Blob([BOM + csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "produtos_atualizado.csv";
  a.click();
  URL.revokeObjectURL(url);
}

// Storage - save progress
function saveProgress() {
  const data = {};
  products.forEach(p => {
    if (p.barcode) data[p.id] = p.barcode;
  });
  try {
    window.parent.postMessage({type: "storage"}, "*");
  } catch(e) {}
}

// Auto-save on barcode change
const origRender = render;

render();
</script>
