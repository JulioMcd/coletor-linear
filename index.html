<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Scanner de Produtos</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  :root {
    --bg:#0f1117; --surface:#1a1d27; --surface2:#242736; --border:#2e3244;
    --accent:#5b8def; --green:#4ade80; --orange:#fb923c;
    --text:#e8eaed; --text-dim:#8b8fa3; --text-muted:#5a5e72;
  }
  body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
  .app { max-width:600px; margin:0 auto; padding:16px; padding-bottom:90px; }

  .header { text-align:center; padding:20px 0 16px; }
  .header h1 { font-size:22px; font-weight:700; background:linear-gradient(135deg,#5b8def,#a78bfa); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .header p { font-size:12px; color:var(--text-dim); margin-top:2px; }

  .stats { display:flex; gap:8px; margin-bottom:14px; }
  .stat { flex:1; background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:10px; text-align:center; }
  .stat-val { font-size:20px; font-weight:700; }
  .stat-val.blue { color:var(--accent); }
  .stat-val.green { color:var(--green); }
  .stat-val.orange { color:var(--orange); }
  .stat-label { font-size:10px; color:var(--text-dim); margin-top:1px; }

  .search-bar { position:relative; margin-bottom:10px; }
  .search-bar input {
    width:100%; padding:12px 12px 12px 40px;
    background:var(--surface); border:1px solid var(--border);
    border-radius:12px; color:var(--text); font-size:15px; font-family:inherit; outline:none;
  }
  .search-bar input:focus { border-color:var(--accent); }
  .search-icon { position:absolute; left:13px; top:50%; transform:translateY(-50%); color:var(--text-dim); pointer-events:none; }

  .filters { display:flex; gap:6px; margin-bottom:14px; }
  .filter-btn {
    flex:1; padding:8px 4px; font-size:12px; font-weight:600; font-family:inherit;
    border:1px solid var(--border); border-radius:10px;
    background:var(--surface); color:var(--text-dim); cursor:pointer; transition:all .15s;
  }
  .filter-btn.active { background:var(--accent); border-color:var(--accent); color:#fff; }

  .product-card {
    background:var(--surface); border:1px solid var(--border);
    border-radius:14px; padding:14px 14px 14px 16px; margin-bottom:8px;
    display:flex; align-items:center; gap:12px; cursor:pointer;
    transition:background .15s, border-color .15s;
  }
  .product-card:active { background:var(--surface2); }
  .product-card.done { border-left:3px solid var(--green); }
  .product-info { flex:1; min-width:0; }
  .product-name { font-size:14px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .product-meta { font-size:11px; color:var(--text-dim); margin-top:2px; display:flex; gap:10px; }
  .product-barcode { font-size:11px; color:var(--green); margin-top:4px; font-family:monospace; }
  .btn-scan {
    flex-shrink:0; width:38px; height:38px; border-radius:10px;
    border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:20px;
    background:rgba(91,141,239,.15); transition:background .15s;
  }
  .product-card.done .btn-scan { background:rgba(74,222,128,.15); }

  .empty-state { text-align:center; padding:50px 20px; color:var(--text-muted); font-size:14px; }

  .dl-bar {
    position:fixed; bottom:0; left:0; right:0;
    padding:10px 16px 20px; background:var(--surface); border-top:1px solid var(--border);
    display:flex; justify-content:center; z-index:50;
  }
  .btn-dl {
    padding:12px 36px; background:linear-gradient(135deg,#5b8def,#a78bfa);
    border:none; border-radius:12px; color:#fff; font-size:14px; font-weight:600;
    font-family:inherit; cursor:pointer;
  }

  /* ---- SCANNER OVERLAY ---- */
  .scan-overlay {
    position:fixed; inset:0; background:#000; z-index:200;
    display:flex; flex-direction:column;
  }
  .scan-hdr {
    position:absolute; top:0; left:0; right:0; z-index:10;
    padding:14px 16px; display:flex; align-items:center; justify-content:space-between;
    background:linear-gradient(to bottom,rgba(0,0,0,.75) 0%,transparent 100%);
  }
  .scan-prod-name { font-size:14px; font-weight:600; max-width:75%; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .scan-prod-sub { font-size:11px; color:rgba(255,255,255,.55); margin-top:2px; }
  .btn-close {
    width:36px; height:36px; border-radius:50%; border:1px solid rgba(255,255,255,.3);
    background:rgba(0,0,0,.4); color:#fff; font-size:20px; cursor:pointer;
    display:flex; align-items:center; justify-content:center; line-height:1;
  }
  .scan-view { flex:1; position:relative; overflow:hidden; }
  #scanVideo { width:100%; height:100%; object-fit:cover; }
  .scan-frame {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    width:270px; height:130px; border:2px solid #4ade80; border-radius:12px;
    box-shadow:0 0 0 2000px rgba(0,0,0,.52); pointer-events:none;
  }
  .scan-line {
    position:absolute; left:50%; top:50%;
    transform:translate(-50%,-50px);
    width:250px; height:2px;
    background:linear-gradient(90deg,transparent,#4ade80,transparent);
    animation:scanline 1.8s ease-in-out infinite;
  }
  @keyframes scanline { 0%,100%{top:calc(50% - 50px)} 50%{top:calc(50% + 50px)} }
  #scanStatus {
    position:absolute; bottom:145px; left:50%; transform:translateX(-50%);
    background:rgba(0,0,0,.65); color:#fff; font-size:13px; font-weight:500;
    padding:8px 20px; border-radius:20px; white-space:nowrap; pointer-events:none;
  }
  .scan-ftr {
    position:absolute; bottom:0; left:0; right:0;
    padding:18px 20px 36px;
    background:linear-gradient(to top,rgba(0,0,0,.85) 0%,transparent 100%);
    display:flex; flex-direction:column; align-items:center; gap:10px;
  }
  .manual-row { display:flex; gap:8px; width:100%; max-width:460px; }
  .manual-row input {
    flex:1; padding:13px 14px; background:rgba(255,255,255,.1);
    border:1px solid rgba(255,255,255,.2); border-radius:12px;
    color:#fff; font-size:15px; font-family:inherit; outline:none;
  }
  .manual-row input::placeholder { color:rgba(255,255,255,.4); }
  .btn-manual {
    padding:13px 20px; background:var(--green); border:none; border-radius:12px;
    color:#000; font-size:14px; font-weight:700; font-family:inherit; cursor:pointer;
  }
  .btn-photo {
    padding:11px 24px; background:rgba(255,255,255,.15); border:1px solid rgba(255,255,255,.25);
    border-radius:12px; color:#fff; font-size:13px; font-weight:600;
    font-family:inherit; cursor:pointer;
  }
  #cameraInput { display:none; }

  /* SUCCESS FLASH */
  .success-flash {
    position:fixed; inset:0; z-index:300;
    display:flex; align-items:center; justify-content:center;
    background:rgba(0,0,0,.7); animation:fadeInOut 1.2s ease forwards;
  }
  @keyframes fadeInOut { 0%{opacity:0} 15%{opacity:1} 80%{opacity:1} 100%{opacity:0} }
  .success-inner {
    background:var(--surface); border:1px solid var(--green);
    border-radius:20px; padding:30px 40px; text-align:center;
  }
  .success-icon { font-size:48px; }
  .success-code { font-size:18px; font-weight:700; font-family:monospace; color:var(--green); margin:8px 0 4px; }
  .success-label { font-size:13px; color:var(--text-dim); }

  /* FALLBACK OVERLAY */
  .fallback-body { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:30px 20px 20px; }
  .fallback-icon { font-size:56px; margin-bottom:14px; }
  .fallback-title { font-size:17px; font-weight:600; margin-bottom:6px; }
  .fallback-sub { font-size:13px; color:var(--text-dim); text-align:center; margin-bottom:24px; }
  .btn-take-photo {
    padding:16px 36px; background:var(--accent); border:none; border-radius:14px;
    color:#fff; font-size:16px; font-weight:600; font-family:inherit; cursor:pointer;
  }
  #fallbackFeedback { margin-top:14px; font-size:13px; color:#ef4444; text-align:center; }
</style>
</head>
<body>
<div class="app" id="app"></div>
<input type="file" id="cameraInput" accept="image/*" capture="environment" />

<script>
// ---- PRODUTOS (adicione os seus aqui ou carregue via CSV) ----
let products = [
  {id:0, codigo:"0000000004219", nome:"ABACATE", embalagem:"KG", barcode:""},
  {id:1, codigo:"0000000000062", nome:"ABOBRINHA", embalagem:"KG", barcode:""},
  {id:2, codigo:"0000000005870", nome:"ALHO DESCASCADO", embalagem:"KG", barcode:""},
  {id:3, codigo:"0000000000031", nome:"ALHO KG", embalagem:"KG", barcode:""},
  {id:4, codigo:"0000000001835", nome:"AMEIXA", embalagem:"KG", barcode:""},
  {id:5, codigo:"0000000011123", nome:"AMENDOIM TORRADO KG", embalagem:"KG", barcode:""},
  {id:6, codigo:"0000000002101", nome:"APRESUNTADO", embalagem:"KG", barcode:""},
  {id:7, codigo:"7893500020158", nome:"ARROZ TIPO 1 TIO JOAO 5KG", embalagem:"PT", barcode:""},
  {id:8, codigo:"0000000001876", nome:"ASA FRANGO KG", embalagem:"KG", barcode:""},
  {id:9, codigo:"0000000002970", nome:"BACALHAU KG", embalagem:"KG", barcode:""},
  {id:10, codigo:"0000000001865", nome:"BACON", embalagem:"KG", barcode:""},
  {id:11, codigo:"0000000000307", nome:"BANANA PRATA", embalagem:"KG", barcode:""},
  {id:12, codigo:"0000000000048", nome:"BATATA KG", embalagem:"KG", barcode:""},
  {id:13, codigo:"0000000000093", nome:"BETERRABA", embalagem:"KG", barcode:""},
  {id:14, codigo:"0000000001182", nome:"BISCOITO POLVILHO KG", embalagem:"KG", barcode:""},
  {id:15, codigo:"0000000005622", nome:"BLANQUET PERU SADIA", embalagem:"KG", barcode:""},
  {id:16, codigo:"0000000003308", nome:"CAR BOV ACEM KG", embalagem:"KG", barcode:""},
  {id:17, codigo:"0000000003360", nome:"CAR BOV ALCATRA KG", embalagem:"KG", barcode:""},
];

// ---- ESTADO ----
let searchTerm = "";
let filterMode = "all";
let scanningProduct = null;
let quaggaRunning = false;
let liveStream = null;
let codeBuffer = [];

// ---- UTILS ----
function getFiltered() {
  let list = products;
  if (searchTerm.trim()) {
    const terms = searchTerm.toLowerCase().split(/\s+/);
    list = list.filter(p => terms.every(t => (p.nome+" "+p.codigo).toLowerCase().includes(t)));
  }
  if (filterMode === "pending") list = list.filter(p => !p.barcode);
  if (filterMode === "done")    list = list.filter(p => !!p.barcode);
  return list;
}

function getStats() {
  const done = products.filter(p => !!p.barcode).length;
  return { total: products.length, done, pending: products.length - done };
}

// ---- RENDER ----
function render() {
  const s = getStats();
  const filtered = getFiltered();
  document.getElementById("app").innerHTML = `
    <div class="header">
      <h1>📦 Scanner de Produtos</h1>
      <p>Escaneie o código de barras de cada produto</p>
    </div>
    <div class="stats">
      <div class="stat"><div class="stat-val blue">${s.total}</div><div class="stat-label">Total</div></div>
      <div class="stat"><div class="stat-val green">${s.done}</div><div class="stat-label">Concluídos</div></div>
      <div class="stat"><div class="stat-val orange">${s.pending}</div><div class="stat-label">Pendentes</div></div>
    </div>
    <div class="search-bar">
      <span class="search-icon">🔍</span>
      <input id="searchInput" type="text" placeholder="Buscar produto..." value="${searchTerm}" autocomplete="off" />
    </div>
    <div class="filters">
      <button class="filter-btn ${filterMode==='all'?'active':''}" onclick="setFilter('all')">Todos</button>
      <button class="filter-btn ${filterMode==='pending'?'active':''}" onclick="setFilter('pending')">Pendentes</button>
      <button class="filter-btn ${filterMode==='done'?'active':''}" onclick="setFilter('done')">Concluídos</button>
    </div>
    <div id="productList">
      ${filtered.length === 0
        ? '<div class="empty-state">Nenhum produto encontrado</div>'
        : filtered.slice(0, 150).map(p => `
          <div class="product-card ${p.barcode?'done':''}" onclick="openScanner(${p.id})">
            <div class="product-info">
              <div class="product-name">${p.nome}</div>
              <div class="product-meta"><span>Cód: ${p.codigo}</span><span>${p.embalagem}</span></div>
              ${p.barcode ? `<div class="product-barcode">☑ ${p.barcode}</div>` : ''}
            </div>
            <div class="btn-scan">${p.barcode ? '✅' : '📷'}</div>
          </div>`).join('')
      }
    </div>
    <div class="dl-bar">
      <button class="btn-dl" onclick="downloadCSV()">⬇ Baixar CSV</button>
    </div>`;
  document.getElementById("searchInput").addEventListener("input", e => {
    searchTerm = e.target.value; render();
  });
  // Re-focus search
  if (searchTerm) {
    const inp = document.getElementById("searchInput");
    inp.focus(); inp.setSelectionRange(inp.value.length, inp.value.length);
  }
}

function setFilter(m) { filterMode = m; render(); }

// ---- SCANNER ----
function openScanner(id) {
  scanningProduct = products.find(p => p.id === id);
  if (!scanningProduct) return;
  codeBuffer = [];

  // Try live camera first
  navigator.mediaDevices && navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment", width:{ideal:1280}, height:{ideal:720} }
  }).then(stream => {
    liveStream = stream;
    showLiveScanner();
  }).catch(() => {
    showFallbackScanner();
  });
}

function showLiveScanner() {
  const overlay = document.createElement("div");
  overlay.className = "scan-overlay";
  overlay.id = "scannerOverlay";
  overlay.innerHTML = `
    <div class="scan-hdr">
      <div class="scan-product">
        <div class="scan-prod-name">${scanningProduct.nome}</div>
        <div class="scan-prod-sub">Cód: ${scanningProduct.codigo}</div>
      </div>
      <button class="btn-close" id="btnClose">✕</button>
    </div>
    <div class="scan-view">
      <video id="scanVideo" autoplay playsinline muted></video>
      <div class="scan-frame"></div>
      <div class="scan-line"></div>
      <div id="scanStatus">Aponte para o código de barras</div>
    </div>
    <div class="scan-ftr">
      <div class="manual-row">
        <input type="text" id="manualInput" placeholder="Ou digite o código..." inputmode="numeric" />
        <button class="btn-manual" id="btnManual">Salvar</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);

  const video = document.getElementById("scanVideo");
  video.srcObject = liveStream;

  document.getElementById("btnClose").onclick = closeScanner;
  document.getElementById("btnManual").onclick = () => {
    const v = document.getElementById("manualInput").value.trim();
    if (v) saveBarcodeAndClose(v);
  };
  document.getElementById("manualInput").addEventListener("keydown", e => {
    if (e.key === "Enter") { const v = e.target.value.trim(); if(v) saveBarcodeAndClose(v); }
  });

  // Try BarcodeDetector first, then Quagga
  if ("BarcodeDetector" in window) {
    startBarcodeDetector(video);
  } else {
    loadQuagga(() => startQuagga(video));
  }
}

// --- BarcodeDetector (native Chrome/Android) ---
let barcodeDetectorInterval = null;
function startBarcodeDetector(video) {
  const detector = new BarcodeDetector({ formats: ["ean_13","ean_8","code_128","code_39","upc_a","upc_e","itf"] });
  updateStatus("🔍 Câmera ativa...");
  barcodeDetectorInterval = setInterval(async () => {
    if (!video.videoWidth) return;
    try {
      const results = await detector.detect(video);
      if (results.length > 0) {
        const code = results[0].rawValue;
        codeBuffer.push(code);
        if (codeBuffer.filter(c => c === code).length >= 3) {
          clearInterval(barcodeDetectorInterval);
          if (navigator.vibrate) navigator.vibrate([100,50,100]);
          saveBarcodeAndClose(code);
        } else {
          updateStatus("Detectado: " + code + "...");
        }
      }
    } catch(e) {}
  }, 200);
}

// --- QuaggaJS ---
function loadQuagga(cb) {
  if (typeof Quagga !== "undefined") { cb(); return; }
  const s = document.createElement("script");
  s.src = "https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js";
  s.onload = cb; document.head.appendChild(s);
}

function startQuagga(video) {
  updateStatus("🔍 Câmera ativa...");
  Quagga.init({
    inputStream: { type:"LiveStream", target: video.parentElement,
      constraints: { facingMode:"environment", width:{ideal:1280}, height:{ideal:720} } },
    decoder: { readers:["ean_reader","ean_8_reader","code_128_reader","code_39_reader","upc_reader","upc_e_reader"] },
    locate: true
  }, err => {
    if (err) { updateStatus("⚠ Erro câmera"); return; }
    Quagga.start();
    quaggaRunning = true;
  });
  Quagga.onDetected(result => {
    if (!result?.codeResult?.code) return;
    const code = result.codeResult.code;
    codeBuffer.push(code);
    if (codeBuffer.filter(c => c === code).length >= 3) {
      if (navigator.vibrate) navigator.vibrate([100,50,100]);
      saveBarcodeAndClose(code);
    } else {
      updateStatus("Lendo: " + code + "...");
    }
  });
}

function showFallbackScanner() {
  const overlay = document.createElement("div");
  overlay.className = "scan-overlay";
  overlay.id = "scannerOverlay";
  overlay.innerHTML = `
    <div class="scan-hdr">
      <div>
        <div class="scan-prod-name">${scanningProduct.nome}</div>
        <div class="scan-prod-sub">Cód: ${scanningProduct.codigo}</div>
      </div>
      <button class="btn-close" id="btnClose">✕</button>
    </div>
    <div class="fallback-body">
      <div class="fallback-icon">📸</div>
      <div class="fallback-title">Câmera ao vivo indisponível</div>
      <div class="fallback-sub">Use o botão abaixo para tirar foto do código de barras</div>
      <button class="btn-take-photo" id="btnPhoto">📷 Tirar Foto do Código</button>
      <div id="fallbackFeedback"></div>
    </div>
    <div class="scan-ftr">
      <div class="manual-row">
        <input type="text" id="manualInput" placeholder="Ou digite o código..." inputmode="numeric" />
        <button class="btn-manual" id="btnManual">Salvar</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);

  document.getElementById("btnClose").onclick = closeScanner;
  document.getElementById("btnPhoto").onclick = () => document.getElementById("cameraInput").click();
  document.getElementById("btnManual").onclick = () => {
    const v = document.getElementById("manualInput").value.trim();
    if (v) saveBarcodeAndClose(v);
  };
}

// --- Photo fallback ---
document.getElementById("cameraInput").addEventListener("change", function(ev) {
  const file = ev.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement("canvas");
      const w = Math.min(img.width, 1280);
      canvas.width = w; canvas.height = img.height * (w / img.width);
      canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
      if ("BarcodeDetector" in window) {
        try {
          new BarcodeDetector({formats:["ean_13","ean_8","code_128","code_39","upc_a","upc_e"]})
            .detect(canvas).then(r => {
              if (r.length > 0) { saveBarcodeAndClose(r[0].rawValue); return; }
              runQuaggaOnCanvas(canvas, w);
            }).catch(() => runQuaggaOnCanvas(canvas, w));
        } catch(e) { runQuaggaOnCanvas(canvas, w); }
      } else { runQuaggaOnCanvas(canvas, w); }
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
  ev.target.value = "";
});

function runQuaggaOnCanvas(canvas, w) {
  loadQuagga(() => {
    const dataUrl = canvas.toDataURL("image/jpeg", 0.9);
    Quagga.decodeSingle({
      src: dataUrl, numOfWorkers: 0, inputStream: { size: w > 640 ? 640 : w },
      decoder: { readers:["ean_reader","ean_8_reader","code_128_reader","code_39_reader","upc_reader","upc_e_reader"] },
      locate: true, locator: { halfSample:false, patchSize:"large" }
    }, result => {
      if (result?.codeResult?.code) {
        saveBarcodeAndClose(result.codeResult.code);
      } else {
        const fb = document.getElementById("fallbackFeedback");
        if (fb) fb.textContent = "⚠️ Não detectado. Tente mais perto.";
      }
    });
  });
}

function updateStatus(msg) {
  const el = document.getElementById("scanStatus"); if (el) el.textContent = msg;
}

function saveBarcodeAndClose(code) {
  if (barcodeDetectorInterval) { clearInterval(barcodeDetectorInterval); barcodeDetectorInterval = null; }
  stopQuagga();
  if (liveStream) { liveStream.getTracks().forEach(t => t.stop()); liveStream = null; }

  if (scanningProduct) scanningProduct.barcode = code;

  const overlay = document.getElementById("scannerOverlay"); if (overlay) overlay.remove();

  const flash = document.createElement("div");
  flash.className = "success-flash";
  flash.innerHTML = `<div class="success-inner">
    <div class="success-icon">✅</div>
    <div class="success-code">${code}</div>
    <div class="success-label">Código salvo com sucesso!</div>
  </div>`;
  document.body.appendChild(flash);
  setTimeout(() => { flash.remove(); }, 1200);

  scanningProduct = null; codeBuffer = [];
  render();
}

function stopQuagga() {
  try { if (quaggaRunning) { Quagga.stop(); Quagga.offDetected(); quaggaRunning = false; } } catch(e) {}
}

function closeScanner() {
  if (barcodeDetectorInterval) { clearInterval(barcodeDetectorInterval); barcodeDetectorInterval = null; }
  stopQuagga();
  if (liveStream) { liveStream.getTracks().forEach(t => t.stop()); liveStream = null; }
  const overlay = document.getElementById("scannerOverlay"); if (overlay) overlay.remove();
  scanningProduct = null; codeBuffer = [];
}

function downloadCSV() {
  const header = "pro_codigo,pro_desc,Codigo de barras,unp_descemb";
  const rows = products.map(p => {
    const e = s => '"' + String(s).replace(/"/g,'""') + '"';
    return [e(p.codigo), e(p.nome), e(p.barcode), e(p.embalagem)].join(",");
  });
  const blob = new Blob(["\uFEFF" + header + "\n" + rows.join("\n")], { type:"text/csv;charset=utf-8;" });
  const a = document.createElement("a"); a.href = URL.createObjectURL(blob);
  a.download = "produtos_atualizado.csv"; a.click();
}

render();
</script>
</body>
</html>
